<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Broad Mobility successful journey</title>
  <desc id="desc">A premium travel and visa success illustration with passport, boarding pass, and global route accents.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dff7ee"/>
      <stop offset="0.48" stop-color="#eff7ff"/>
      <stop offset="1" stop-color="#fff4cf"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00a651"/>
      <stop offset="1" stop-color="#00d47a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2c94c"/>
      <stop offset="1" stop-color="#fb8500"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#001f3f" flood-opacity=".20"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="url(#sky)"/>
  <circle cx="1010" cy="130" r="170" fill="#00a651" opacity=".10"/>
  <circle cx="180" cy="780" r="230" fill="#f2c94c" opacity=".17"/>
  <path d="M100 260 C330 120 490 405 705 266 C875 156 967 235 1110 105" fill="none" stroke="#00a651" stroke-width="7" stroke-linecap="round" stroke-dasharray="24 30" opacity=".36"/>
  <path d="M119 700 C311 569 474 734 646 590 C801 460 960 565 1094 430" fill="none" stroke="#168aad" stroke-width="5" stroke-linecap="round" stroke-dasharray="16 26" opacity=".34"/>
  <g filter="url(#soft)">
    <rect x="192" y="166" width="395" height="560" rx="38" fill="#06213d" transform="rotate(-7 389 446)"/>
    <rect x="225" y="222" width="330" height="94" rx="22" fill="url(#green)" opacity=".95" transform="rotate(-7 390 269)"/>
    <rect x="254" y="372" width="248" height="18" rx="9" fill="#e8f1f8" opacity=".92" transform="rotate(-7 378 381)"/>
    <rect x="251" y="421" width="288" height="18" rx="9" fill="#e8f1f8" opacity=".58" transform="rotate(-7 395 430)"/>
    <rect x="250" y="470" width="220" height="18" rx="9" fill="#e8f1f8" opacity=".58" transform="rotate(-7 360 479)"/>
    <circle cx="460" cy="602" r="58" fill="none" stroke="#f2c94c" stroke-width="11" opacity=".90" transform="rotate(-7 460 602)"/>
  </g>
  <g filter="url(#soft)">
    <rect x="505" y="300" width="505" height="280" rx="34" fill="#ffffff" transform="rotate(7 757 440)"/>
    <rect x="548" y="352" width="198" height="28" rx="14" fill="#00a651" opacity=".20" transform="rotate(7 647 366)"/>
    <rect x="550" y="414" width="385" height="16" rx="8" fill="#06213d" opacity=".18" transform="rotate(7 743 422)"/>
    <rect x="550" y="456" width="322" height="16" rx="8" fill="#06213d" opacity=".14" transform="rotate(7 711 464)"/>
    <path d="M836 516 l112 -96" stroke="url(#gold)" stroke-width="18" stroke-linecap="round"/>
    <path d="M946 421 l-38 6 l27 31" fill="none" stroke="url(#gold)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g filter="url(#glow)">
    <circle cx="926" cy="248" r="18" fill="#00a651"/>
    <circle cx="990" cy="334" r="12" fill="#f2c94c"/>
    <circle cx="800" cy="174" r="10" fill="#168aad"/>
    <circle cx="188" cy="160" r="13" fill="#fb8500"/>
  </g>
</svg>
